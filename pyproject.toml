[project]
name = "ontologx"
version = "0.1.0"
description = ""
authors = [{name="Luca Cotti", email = "luca.cotti@unibs.it"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.13,<4.0"
dependencies = [
    "langchain>=0.3.18",
    "langchain-community>=0.3.17",
    "python-dotenv>=1.0.1",
    "neo4j>=5.28.1",
    "pydantic (>=2.11.7,<3.0.0)",
    "langchain-neo4j>=0.4.0",
    "rdflib (>=7.1.4,<8.0.0)",
    "typer (>=0.16.0,<0.17.0)",
    "deepeval (>=3.3.0,<4.0.0)",
    "pyshacl (>=0.30.1,<0.31.0)",
]

[project.scripts]
olx = "ontologx.__main__:main"

[tool.poetry.group.dev.dependencies]
ruff = "^0.12.4"
pre-commit = "^4.1.0"

[tool.poetry.group.huggingface]
optional = true

[tool.poetry.group.huggingface.dependencies]
torch = "^2.6.0"
langchain-huggingface = "^0.1.2"
sentence-transformers = "^3.4.1"
accelerate = "^1.4.0"
einops = "^0.8.1"

[tool.poetry.group.ollama]
optional = true

[tool.poetry.group.ollama.dependencies]
langchain-ollama = "^0.2.3"

[tool.poetry.group.aws]
optional = true

[tool.poetry.group.aws.dependencies]
langchain-aws = "^0.2.22"

[tool.poetry.group.vllm]
optional = true

[tool.poetry.group.vllm.dependencies]
langchain-openai = "^0.3.16"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = [
    "ALL", # include all the rules, including new ones
]
ignore = [
    "D107", # Missing docstring in __init__
    "FBT001", # Boolean-typed positional argument in function definition
    "PLR0913", # Too many arguments in function definition
    "ANN204", # Missing return type for special method `__init__`
    "TC002", # Move into type-checking block
    "D203", # Incorrect blank line before class
    "D213", # Multi line summary second line
    "PLC0415" # Imports at top level
]