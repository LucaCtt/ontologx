name: ${EXPERIMENT_NAME:-default}
include:
  - common.yaml

services:
  ontologx:
    build:
      context: ..
      dockerfile: docker/ontologx.dockerfile
    container_name: ${EXPERIMENT_NAME:-default}_olx
    environment:
      - PARSER_BACKEND=bedrock
      - EMBEDDINGS_BACKEND=infinity
      - TESTS_BACKEND=bedrock
      - EMBEDDINGS_BACKEND_URL=http://embs:9000
      - NEO4J_URL=bolt://neo4j:7687
      - TRANSFORMERS_VERBOSITY=critical
    env_file:
      - ${PWD}/.env
    depends_on:
      embs:
        condition: service_healthy
        restart: true
      neo4j:
        condition: service_healthy
        restart: true
    networks:
      - ontologx
