services:
  ontologx:
    build:
      context: ..
      dockerfile: docker/ontologx.dockerfile
    command: olx clear && olx run
    restart: always
    env_file:
      - ../.env
    depends_on:
      - ollama
      - neo4j
    networks:
      - ontologx-docker
      
  ollama:
    volumes:
      - ./ollama/ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: always
    image: docker.io/ollama/ollama:latest
    ports:
      - 11434:11434
    env_file:
      - ../.env
    networks:
      - ontologx-docker
    post_start:
      - command: |
          ollama pull $PARSER_MODEL && ollama pull $EMBEDDINGS_MODEL
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
  neo4j:
    build:
      context: .
      dockerfile: neo4j.dockerfile
    container_name: neo4j
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
    ports:
      - 7687:7687
      - 7474:7474
    networks:
      - ontologx-docker
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7474/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

networks:
  ontologx-docker:
    driver: bridge