services:
  ontologx:
    build:
      context: ..
      dockerfile: docker/ontologx.dockerfile
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME}-ontologx
    environment:
      - LLM_BACKEND=bedrock
      - EMBEDDINGS_BACKEND=ollama
      - EMBEDDINGS_BACKEND_URL=http://embeddings:11434
      - NEO4J_URL=bolt://neo4j:7687
    depends_on:
      ollama:
        condition: service_healthy
        restart: true
      neo4j:
        condition: service_healthy
        restart: true
    networks:
      - ontologx-docker
  
  ollama:
    image: ollama/ollama:0.6.8
    volumes:
      - ./ollama/ollama:/root/.ollama
    container_name: ${COMPOSE_PROJECT_NAME}-ontologx-ollama
    restart: unless-stopped
    post_start:
      - command: |
          ollama pull $PARSER_MODEL && ollama pull $EMBEDDINGS_MODEL
    networks:
      - ontologx-docker
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  neo4j:
    build:
      context: .
      dockerfile: neo4j.dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-ontologx-neo4j
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
    networks:
      - ontologx-docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 3s

networks:
  ontologx-docker:
    driver: bridge

