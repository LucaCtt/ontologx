services:
  tactics:
    image: vllm/vllm-openai:v0.10.1.1
    container_name: ${EXPERIMENT_NAME:-default}_tactics
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-default}/vllm/llms:/root/.cache/huggingface # Save models so they are not downloaded every time
    runtime: nvidia
    ipc: host # Allow the container access to the host's shared memory
    restart: on-failure:3
    expose:
      - 8000
    networks:
      - ontologx
    entrypoint: python3
    command: -m vllm.entrypoints.openai.api_server --model ${TACTICS_MODEL} --task generate --trust-remote-code ${VLLM_ADDITIONAL_ARGS-} # Ad-hoc vllm arguments are likely to be needed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 300 # A lot of retries because big models may take a while to load
      start_period: 30s
      start_interval: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  embs:
    image: michaelf34/infinity:0.0.77
    container_name: ${EXPERIMENT_NAME:-default}_embs
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-default}/embs:/app/.cache
    restart: on-failure:3
    runtime: nvidia
    command: v2 --model-id ${EMBEDDINGS_MODEL} --dtype float16 --port 9000
    networks:
      - ontologx
    expose:
      - 9000
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/docs"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  neo4j:
    image: neo4j:5.20.0
    container_name: ${EXPERIMENT_NAME:-default}_neo4j
    environment:
      - NEO4J_PLUGINS=["apoc", "n10s"]
      - NEO4J_dbms_usage__report_enabled=false
      - NEO4J_AUTH=neo4j/password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-default}/neo4j/data:/data
      - ${PWD}/exps/${EXPERIMENT_NAME:-default}/neo4j/logs:/logs
      - ${PWD}/exps/${EXPERIMENT_NAME:-default}/neo4j/plugins:/plugins
    networks:
      - ontologx
    expose:
      - 7474
      - 7687
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"] # The neo4j image has wget only, not curl
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s

networks:
  ontologx:
    driver: bridge
