name: ${EXPERIMENT_NAME:-olx}

services:
  embs:
    image: michaelf34/infinity:0.0.77
    container_name: ${EXPERIMENT_NAME:-olx}_embs
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-olx}/embs:/app/.cache
    restart: on-failure:3
    runtime: nvidia
    command: v2 --model-id ${EMBEDDINGS_MODEL} --dtype float16 --port 9000
    expose:
      - 9000
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/docs"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  graphdb:
    image: ontotext/graphdb:11.2.0
    container_name: ${EXPERIMENT_NAME:-olx}_graphdb
    volumes:
      - ${PWD}/graphdb.license:/opt/graphdb/home/conf/graphdb.license
      - ${PWD}/exps/${EXPERIMENT_NAME:-olx}/graphdb_data:/opt/graphdb/home/data
    expose:
      - 7200
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7200"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s

  ontologx:
    build:
      context: ..
      dockerfile: docker/ontologx.dockerfile
    container_name: ${EXPERIMENT_NAME:-olx}_ontologx
    environment:
      - EMBEDDINGS_URL=http://embs:9000
      - DB_URL=http://graphdb:7200
      - OPENAI_API_KEY=Empty # Required by OpenAI client API
    env_file:
      - ${PWD}/.env
    depends_on:
      embs:
        condition: service_healthy
        restart: true
      graphdb:
        condition: service_healthy
        restart: true
