name: ${EXPERIMENT_NAME:-default}
include:
  - common.yaml

services:
  ontologx:
    build:
      context: ..
      dockerfile: docker/ontologx.dockerfile
    container_name: ${EXPERIMENT_NAME:-default}_olx
    environment:
      - LLM_BACKEND=openai
      - LLM_BACKEND_URL=http://llm:8000/v1
      - EMBEDDINGS_BACKEND=infinity
      - EMBEDDINGS_BACKEND_URL=http://embs:9000
      - DB_URL=http://graphdb:7200/repositories/ontologx
      - OPENAI_API_KEY=Empty # Required by OpenAI client API
    env_file:
      - ${PWD}/.env
    depends_on:
      llm:
        condition: service_healthy
        restart: true
      embs:
        condition: service_healthy
        restart: true
      graphdb:
        condition: service_healthy
        restart: true
    networks:
      - ontologx

  llm:
    image: vllm/vllm-openai:v0.10.1.1
    container_name: ${EXPERIMENT_NAME:-default}_llm
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-default}/vllm/llms:/root/.cache/huggingface # Save models so they are not downloaded every time
    runtime: nvidia
    ipc: host # Allow the container access to the host's shared memory
    restart: on-failure:3
    expose:
      - 8000
    networks:
      - ontologx
    entrypoint: python3
    command: -m vllm.entrypoints.openai.api_server --model ${PARSER_MODEL} --task generate --trust-remote-code ${VLLM_ADDITIONAL_ARGS-} # Ad-hoc vllm arguments are likely to be needed
    env_file:
      - ${PWD}/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 300 # A lot of retries because big models may take a while to load
      start_period: 30s
      start_interval: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
