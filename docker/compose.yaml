version: "2"
services:
  neo4j:
    image: neo4j:2025.03.0
    container_name: neo4j
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4j_PLUGINS=["apoc", "n10s"]
    ports:
      - "7687:7687"  # Bolt
      - "7474:7474" # HTTP
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7474/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    
  vllm:
    build:
      context: .
      dockerfile: vllm_neuron.Dockerfile
    container_name: vllm
    ports:
      - "8000:8000"
    environment:
      - MODEL=${PARSER_MODEL}
      - TEMPERATURE=${PARSER_TEMPERATURE}
    volumes:
      - ./vllm:/vllm
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
  
  ontologx:
    build:
      context: .
      dockerfile: ontologx.Dockerfile
    container_name: ontologx