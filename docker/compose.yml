name: ontologx

services:
  embs:
    image: michaelf34/infinity:0.0.77
    container_name: ontologx_embs
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-ontologx}/embs:/app/.cache
    command: v2 --model-id ${EMBEDDINGS_MODEL:-Alibaba-NLP/gte-multilingual-base} --dtype float16 --port 9000
    restart: on-failure:3
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:9000/docs" ]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    expose:
      - '9000'
    runtime: nvidia

  graphdb:
    image: ontotext/graphdb:11.2.0
    container_name: ontologx_graphdb
    volumes:
      - ${PWD}/graphdb.license:/opt/graphdb/home/conf/graphdb.license
      - ${PWD}/exps/${EXPERIMENT_NAME:-ontologx}/graphdb_data:/opt/graphdb/home/data
    restart: on-failure:3
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:7200/repositories" ]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s
    expose:
      - '127.0.0.1:7200'

  main:
    build:
      context: ..
      dockerfile: docker/ontologx.dockerfile
    container_name: ontologx_main
    depends_on:
      embs:
        condition: service_healthy
        restart: true
      graphdb:
        condition: service_healthy
        restart: true
      weaviate:
        condition: service_healthy
        restart: true
    environment:
      - EMBEDDINGS_URL=http://embs:9000
      - GRAPH_DATABASE_URL=http://graphdb:7200
      - VECTOR_DATABASE_URL=http://weaviate:8080
    env_file:
      - ${PWD}/.env

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.5
    volumes:
      - ${PWD}/exps/${EXPERIMENT_NAME:-ontologx}/weaviate_data:/var/lib/weaviate
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED='true'
      - PERSISTENCE_DATA_PATH='/var/lib/weaviate'
      - CLUSTER_HOSTNAME='node1'
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/live" ]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 30s
      start_interval: 10s
    expose:
      - '8080'
      - '50051'
